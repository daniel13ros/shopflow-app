services:
  postgres:
    image: postgres:17
    container_name: shopflow-postgres
    networks:
      - backend-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: company-database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d company-database"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    
  backend:
    build: 
      context: ./backend
      target: production 
    container_name: shopflow-backend
    networks:
      - backend-network
    ports:
      - 3000:3000
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/nodejs/bin/node -e \"require('http').get('http://localhost:3000/health', res => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 10s
      retries: 3
  
  frontend:
    build:
      context: ./frontend
      target: production
    container_name: shopflow-frontend
    networks: [
      backend-network ,
      frontend-network
    ]
    ports:
      - 8080:80
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge

volumes:
  postgres-data:
